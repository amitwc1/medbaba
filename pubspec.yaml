name: mind_vault
description: "MindVault — Think. Connect. Learn. Remember. Obsidian-style knowledge management meets Anki-style spaced repetition."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Database (Drift / SQLite)
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.3
  firebase_messaging: ^15.2.3
  google_sign_in: ^6.2.2

  # AI
  google_generative_ai: ^0.4.6

  # Spaced Repetition
  fsrs: ^2.0.1

  # Rich Text Editor
  flutter_quill: ^11.4.0

  # Charts
  fl_chart: ^0.70.2

  # Calendar
  table_calendar: ^3.2.0

  # UI & Utilities
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.3
  local_auth: ^2.3.0
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.4.0
  pdf: ^3.11.3
  pdfx: ^2.6.0
  csv: ^6.0.0
  animate_do: ^3.3.4
  smooth_page_indicator: ^1.2.0+3
  lottie: ^3.3.1
  flex_color_scheme: ^8.1.0
  flutter_staggered_grid_view: ^0.7.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.2

  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  freezed_annotation: ^2.4.4
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
